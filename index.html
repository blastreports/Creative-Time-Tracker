<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Time Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff;
      --bg2: #f5f4f0;
      --bg3: #eeedea;
      --text: #1a1a18;
      --text2: #6b6b67;
      --text3: #9e9e99;
      --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.22);
      --radius: 8px;
      --radius-lg: 12px;
      --accent: #378ADD;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --bg2: #252523;
        --bg3: #2e2e2b;
        --text: #f0efe8;
        --text2: #a0a09a;
        --text3: #666662;
        --border: rgba(255,255,255,0.1);
        --border2: rgba(255,255,255,0.2);
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; }
    header { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 16px; height: 56px; }
    header h1 { font-size: 15px; font-weight: 500; }
    header span { font-size: 13px; color: var(--text2); }
    .tabs { display: flex; gap: 0; border-bottom: 0.5px solid var(--border); background: var(--bg); padding: 0 24px; }
    .tab { padding: 12px 18px; font-size: 14px; cursor: pointer; border: none; background: none; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -0.5px; }
    .tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
    .container { max-width: 760px; margin: 0 auto; padding: 28px 20px; }
    .section { display: none; }
    .section.active { display: block; }
    .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 20px 24px; margin-bottom: 16px; }
    label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; font-weight: 500; }
    select, input[type="text"], input[type="number"], input[type="date"], input[type="password"], textarea {
      width: 100%; padding: 9px 11px; font-size: 14px;
      border: 0.5px solid var(--border2); border-radius: var(--radius);
      background: var(--bg); color: var(--text); font-family: inherit;
    }
    select:focus, input:focus, textarea:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: transparent; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .form-row { margin-bottom: 14px; }
    .btn { display: inline-block; padding: 10px 20px; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); font-family: inherit; }
    .btn-primary { background: var(--text); color: var(--bg); border-color: transparent; width: 100%; margin-top: 4px; }
    .btn-primary:hover { opacity: 0.85; }
    .btn:hover { background: var(--bg2); }
    .metric-card { background: var(--bg2); border-radius: var(--radius); padding: 14px 16px; }
    .metric-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
    .metric-value { font-size: 26px; font-weight: 500; }
    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .bar-label { font-size: 13px; min-width: 140px; max-width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { flex: 1; height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    .bar-hrs { font-size: 12px; color: var(--text2); min-width: 40px; text-align: right; }
    .section-title { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin: 20px 0 10px; }
    .entry-row { display: grid; grid-template-columns: 160px 1fr 1fr 52px 70px 28px; gap: 8px; align-items: center; padding: 10px 14px; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; font-size: 13px; }
    .entry-row:hover { border-color: var(--border2); }
    .avatar { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; flex-shrink: 0; }
    .person-cell { display: flex; align-items: center; gap: 7px; }
    .muted { color: var(--text2); }
    .small { font-size: 11px; color: var(--text3); }
    .del-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 17px; line-height: 1; padding: 0; }
    .del-btn:hover { color: #E24B4A; }
    .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-bar select { font-size: 13px; padding: 6px 10px; width: auto; flex: 1; min-width: 140px; }
    .empty { text-align: center; color: var(--text3); padding: 2.5rem; font-size: 14px; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 10px 20px; border-radius: var(--radius); font-size: 13px; opacity: 0; transition: opacity 0.25s; pointer-events: none; z-index: 999; white-space: nowrap; }
    .toast.show { opacity: 1; }
    .lock-screen { text-align: center; padding: 3rem 1rem; }
    .lock-screen h2 { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
    .lock-screen p { font-size: 14px; color: var(--text2); margin-bottom: 20px; }
    .lock-screen input { max-width: 280px; margin-bottom: 10px; }
    .lock-screen .btn { max-width: 280px; width: 100%; }
    .status-badge { display: inline-block; padding: 2px 7px; border-radius: 20px; font-size: 11px; font-weight: 500; }
    .status-ok { background: #EAF3DE; color: #3B6D11; }
    .status-err { background: #FCEBEB; color: #A32D2D; }
    @media (prefers-color-scheme: dark) {
      .status-ok { background: #27500A; color: #C0DD97; }
      .status-err { background: #501313; color: #F7C1C1; }
    }
    @media (max-width: 600px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .entry-row { grid-template-columns: 1fr 1fr 40px; }
      .entry-row .muted, .entry-row .small { display: none; }
    }
  </style>
</head>
<body>

<header>
  <h1>Time Tracker</h1>
  <span>Creative Team</span>
  <span id="sync-status" style="margin-left:auto;"></span>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('log')">Log time</button>
  <button class="tab" onclick="switchTab('dashboard')">Dashboard</button>
  <button class="tab" onclick="switchTab('entries')">All entries</button>
</div>

<div class="container">

  <!-- LOG TIME -->
  <div id="tab-log" class="section active">
    <div class="card">
      <div class="grid-2">
        <div class="form-row">
          <label>Your name</label>
          <select id="person">
            <option value="">Select team member...</option>
            <option>Alex Chen</option><option>Billie Santos</option><option>Casey Moore</option>
            <option>Dana Rivera</option><option>Eli Thompson</option><option>Fiona Park</option>
            <option>George Lee</option><option>Hannah Osei</option><option>Isla Murray</option>
            <option>James Walsh</option><option>Kira Novak</option><option>Luca Ferri</option>
          </select>
        </div>
        <div class="form-row">
          <label>Date</label>
          <input type="date" id="date" />
        </div>
      </div>
      <div class="grid-2">
        <div class="form-row">
          <label>Project</label>
          <select id="project">
            <option value="">Select project...</option>
            <option>Brand & Marketing</option><option>Client Events</option><option>Internal Ops</option>
            <option>Production & Logistics</option><option>Design & Creative</option><option>Admin</option>
          </select>
        </div>
        <div class="form-row">
          <label>Event / task</label>
          <input type="text" id="event" placeholder="e.g. Summer Gala, Vendor calls..." />
        </div>
      </div>
      <div class="grid-2">
        <div class="form-row">
          <label>Hours</label>
          <input type="number" id="hours" min="0.5" max="24" step="0.5" placeholder="e.g. 2.5" />
        </div>
        <div class="form-row">
          <label>Notes (optional)</label>
          <input type="text" id="notes" placeholder="What did you work on?" />
        </div>
      </div>
      <button class="btn btn-primary" onclick="logEntry()">Log hours</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="tab-dashboard" class="section">
    <div id="lock-screen" class="card lock-screen">
      <h2>Manager dashboard</h2>
      <p>Enter the password to view the dashboard.</p>
      <input type="password" id="dash-password" placeholder="Password" onkeydown="if(event.key==='Enter')checkPass()" />
      <button class="btn btn-primary" style="max-width:280px;width:100%;margin-top:8px;" onclick="checkPass()">Unlock</button>
      <p id="pass-error" style="color:#E24B4A;font-size:13px;margin-top:8px;display:none;">Incorrect password.</p>
    </div>
    <div id="dash-content" style="display:none;">
      <div class="filter-bar">
        <select id="dash-filter-project" onchange="renderDash()">
          <option value="">All projects</option>
          <option>Brand & Marketing</option><option>Client Events</option><option>Internal Ops</option>
          <option>Production & Logistics</option><option>Design & Creative</option><option>Admin</option>
        </select>
        <select id="dash-filter-person" onchange="renderDash()">
          <option value="">All people</option>
          <option>Alex Chen</option><option>Billie Santos</option><option>Casey Moore</option>
          <option>Dana Rivera</option><option>Eli Thompson</option><option>Fiona Park</option>
          <option>George Lee</option><option>Hannah Osei</option><option>Isla Murray</option>
          <option>James Walsh</option><option>Kira Novak</option><option>Luca Ferri</option>
        </select>
        <button class="btn" onclick="loadEntries().then(renderDash)" style="font-size:13px;padding:6px 14px;">Refresh</button>
      </div>
      <div class="grid-3" id="dash-metrics" style="margin-bottom:20px;"></div>
      <div class="card" id="dash-charts"></div>
    </div>
  </div>

  <!-- ALL ENTRIES -->
  <div id="tab-entries" class="section">
    <div class="filter-bar">
      <select id="entries-filter-project" onchange="renderEntries()">
        <option value="">All projects</option>
        <option>Brand & Marketing</option><option>Client Events</option><option>Internal Ops</option>
        <option>Production & Logistics</option><option>Design & Creative</option><option>Admin</option>
      </select>
      <select id="entries-filter-person" onchange="renderEntries()">
        <option value="">All people</option>
        <option>Alex Chen</option><option>Billie Santos</option><option>Casey Moore</option>
        <option>Dana Rivera</option><option>Eli Thompson</option><option>Fiona Park</option>
        <option>George Lee</option><option>Hannah Osei</option><option>Isla Murray</option>
        <option>James Walsh</option><option>Kira Novak</option><option>Luca Ferri</option>
      </select>
      <button class="btn" onclick="loadEntries().then(renderEntries)" style="font-size:13px;padding:6px 14px;">Refresh</button>
    </div>
    <div id="entries-list"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  // ── CONFIG ──────────────────────────────────────────────────────────────────
  // After deploying your Google Apps Script, paste the web app URL below.
  const APPS_SCRIPT_URL = 'https://script.google.com/a/macros/blast.tv/s/AKfycby27ujPkxfIQE-nyVVCyTuOwKy1Rab5vA3Dr09D5VN7QkcGcFpB0lmww3kEkuU2di2r/exec';
  const DASHBOARD_PASSWORD = 'manager2024'; // Change this!
  // ────────────────────────────────────────────────────────────────────────────

  const COLORS = ['#378ADD','#1D9E75','#D85A30','#D4537E','#BA7517','#639922','#7F77DD','#888780','#E24B4A','#0F6E56','#993C1D','#534AB7'];
  const AVATAR_BG = ['#B5D4F4','#9FE1CB','#F5C4B3','#F4C0D1','#FAC775','#C0DD97','#CECBF6','#D3D1C7','#F7C1C1','#5DCAA5','#F0997B','#AFA9EC'];
  const AVATAR_FG = ['#0C447C','#085041','#712B13','#72243E','#633806','#3B6D11','#3C3489','#444441','#791F1F','#04342C','#993C1D','#26215C'];
  const PEOPLE = ['Alex Chen','Billie Santos','Casey Moore','Dana Rivera','Eli Thompson','Fiona Park','George Lee','Hannah Osei','Isla Murray','James Walsh','Kira Novak','Luca Ferri'];

  let entries = [];
  let unlocked = false;

  document.getElementById('date').value = new Date().toISOString().split('T')[0];

  function initials(name) { return name.split(' ').map(n=>n[0]).join('').toUpperCase(); }
  function personIdx(name) { return PEOPLE.indexOf(name); }

  function toast(msg, dur=2200) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), dur);
  }

  function setSyncStatus(msg, ok) {
    const el = document.getElementById('sync-status');
    el.innerHTML = `<span class="status-badge ${ok ? 'status-ok' : 'status-err'}">${msg}</span>`;
  }

  function switchTab(t) {
    document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', ['log','dashboard','entries'][i]===t));
    document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-'+t).classList.add('active');
    if (t === 'entries') loadEntries().then(renderEntries);
    if (t === 'dashboard' && unlocked) loadEntries().then(renderDash);
  }

  // ── GOOGLE SHEETS INTEGRATION ────────────────────────────────────────────────
  async function postEntry(entry) {
    if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'https://script.google.com/a/macros/blast.tv/s/AKfycby27ujPkxfIQE-nyVVCyTuOwKy1Rab5vA3Dr09D5VN7QkcGcFpB0lmww3kEkuU2di2r/exec') {
      // Fallback to localStorage in dev mode
      entries.unshift(entry);
      return true;
    }
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(entry)
    });
    const data = await res.json();
    return data.status === 'ok';
  }

  async function loadEntries() {
    if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'https://script.google.com/a/macros/blast.tv/s/AKfycby27ujPkxfIQE-nyVVCyTuOwKy1Rab5vA3Dr09D5VN7QkcGcFpB0lmww3kEkuU2di2r/exec') {
      return; // use in-memory entries in dev mode
    }
    try {
      const res = await fetch(APPS_SCRIPT_URL + '?action=get');
      const data = await res.json();
      entries = data.entries || [];
      setSyncStatus('Synced', true);
    } catch(e) {
      setSyncStatus('Offline', false);
    }
  }

  // ── LOG ENTRY ────────────────────────────────────────────────────────────────
  async function logEntry() {
    const person  = document.getElementById('person').value;
    const date    = document.getElementById('date').value;
    const project = document.getElementById('project').value;
    const event   = document.getElementById('event').value.trim();
    const hours   = parseFloat(document.getElementById('hours').value);
    const notes   = document.getElementById('notes').value.trim();
    if (!person || !date || !project || !event || !hours || hours <= 0) {
      toast('Please fill in all required fields.'); return;
    }
    const btn = document.querySelector('#tab-log .btn-primary');
    btn.textContent = 'Saving...'; btn.disabled = true;
    try {
      const ok = await postEntry({ id: Date.now(), person, date, project, event, hours, notes });
      if (ok) {
        toast('Hours logged!');
        document.getElementById('event').value = '';
        document.getElementById('hours').value = '';
        document.getElementById('notes').value = '';
      } else { toast('Save failed — try again.'); }
    } catch(e) { toast('Network error — check connection.'); }
    btn.textContent = 'Log hours'; btn.disabled = false;
  }

  // ── PASSWORD ─────────────────────────────────────────────────────────────────
  function checkPass() {
    const pw = document.getElementById('dash-password').value;
    if (pw === DASHBOARD_PASSWORD) {
      unlocked = true;
      document.getElementById('lock-screen').style.display = 'none';
      document.getElementById('dash-content').style.display = 'block';
      loadEntries().then(renderDash);
    } else {
      document.getElementById('pass-error').style.display = 'block';
    }
  }

  // ── DASHBOARD ────────────────────────────────────────────────────────────────
  function filteredDash() {
    const proj   = document.getElementById('dash-filter-project')?.value || '';
    const person = document.getElementById('dash-filter-person')?.value || '';
    return entries.filter(e => (!proj || e.project===proj) && (!person || e.person===person));
  }

  function renderDash() {
    const data = filteredDash();
    const totalHrs  = data.reduce((s,e)=>s+(+e.hours),0);
    const projects  = [...new Set(data.map(e=>e.project))];
    const people    = [...new Set(data.map(e=>e.person))];

    document.getElementById('dash-metrics').innerHTML = `
      <div class="metric-card"><div class="metric-label">Total hours</div><div class="metric-value">${totalHrs.toFixed(1)}</div></div>
      <div class="metric-card"><div class="metric-label">Active people</div><div class="metric-value">${people.length}</div></div>
      <div class="metric-card"><div class="metric-label">Projects tracked</div><div class="metric-value">${projects.length}</div></div>
    `;

    if (!data.length) {
      document.getElementById('dash-charts').innerHTML = '<div class="empty">No entries yet.</div>';
      return;
    }

    const byProject = {}, byEvent = {}, byPerson = {};
    data.forEach(e => {
      byProject[e.project] = (byProject[e.project]||0) + (+e.hours);
      const ek = e.project+': '+e.event;
      byEvent[ek] = (byEvent[ek]||0) + (+e.hours);
      byPerson[e.person] = (byPerson[e.person]||0) + (+e.hours);
    });

    const sortedProj   = Object.entries(byProject).sort((a,b)=>b[1]-a[1]);
    const sortedEvents = Object.entries(byEvent).sort((a,b)=>b[1]-a[1]).slice(0,8);
    const sortedPeople = Object.entries(byPerson).sort((a,b)=>b[1]-a[1]);
    const maxProj   = sortedProj[0]?.[1]   || 1;
    const maxEvent  = sortedEvents[0]?.[1] || 1;
    const maxPerson = sortedPeople[0]?.[1] || 1;

    const bars = (arr, max, colorOffset=0) => arr.map(([label, hrs], i) => `
      <div class="bar-row">
        <div class="bar-label" title="${label}">${label}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(hrs/max*100)}%;background:${COLORS[(i+colorOffset)%COLORS.length]};"></div></div>
        <div class="bar-hrs">${(+hrs).toFixed(1)}h</div>
      </div>`).join('');

    const personRows = sortedPeople.map(([name, hrs]) => {
      const idx = personIdx(name);
      return `<div class="bar-row">
        <div class="person-cell bar-label" style="min-width:140px;max-width:140px;">
          <div class="avatar" style="background:${AVATAR_BG[idx]||'#D3D1C7'};color:${AVATAR_FG[idx]||'#444441'};">${initials(name)}</div>
          ${name}
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round((+hrs)/maxPerson*100)}%;background:${COLORS[idx%COLORS.length]};"></div></div>
        <div class="bar-hrs">${(+hrs).toFixed(1)}h</div>
      </div>`;
    }).join('');

    document.getElementById('dash-charts').innerHTML = `
      <div class="section-title">Hours by project</div>${bars(sortedProj, maxProj)}
      <div class="section-title">Top events / tasks</div>${bars(sortedEvents, maxEvent, 3)}
      <div class="section-title">Hours by person</div>${personRows}
    `;
  }

  // ── ENTRIES LIST ─────────────────────────────────────────────────────────────
  function renderEntries() {
    const proj   = document.getElementById('entries-filter-project').value;
    const person = document.getElementById('entries-filter-person').value;
    const data   = entries.filter(e => (!proj || e.project===proj) && (!person || e.person===person));
    const list   = document.getElementById('entries-list');
    if (!data.length) { list.innerHTML = '<div class="empty">No entries found.</div>'; return; }
    list.innerHTML = data.map(e => {
      const idx = personIdx(e.person);
      return `<div class="entry-row">
        <div class="person-cell">
          <div class="avatar" style="background:${AVATAR_BG[idx]||'#D3D1C7'};color:${AVATAR_FG[idx]||'#444441'};">${initials(e.person)}</div>
          ${e.person}
        </div>
        <div class="muted">${e.project}</div>
        <div>${e.event}${e.notes ? `<br><span class="small">${e.notes}</span>` : ''}</div>
        <div style="font-weight:500;">${(+e.hours).toFixed(1)}h</div>
        <div class="small">${e.date}</div>
        <button class="del-btn" onclick="deleteEntry(${e.id})">×</button>
      </div>`;
    }).join('');
  }

  async function deleteEntry(id) {
    if (!confirm('Delete this entry?')) return;
    if (APPS_SCRIPT_URL && APPS_SCRIPT_URL !== 'https://script.google.com/a/macros/blast.tv/s/AKfycby27ujPkxfIQE-nyVVCyTuOwKy1Rab5vA3Dr09D5VN7QkcGcFpB0lmww3kEkuU2di2r/exec') {
      await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', id }) });
      await loadEntries();
    } else {
      entries = entries.filter(e => e.id != id);
    }
    renderEntries();
  }

  // Init
  loadEntries();
</script>
</body>
</html>
