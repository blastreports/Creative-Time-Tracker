<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Time Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff;
      --bg2: #f5f4f0;
      --bg3: #eeedea;
      --text: #1a1a18;
      --text2: #6b6b67;
      --text3: #9e9e99;
      --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.22);
      --radius: 8px;
      --radius-lg: 12px;
      --accent: #378ADD;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --bg2: #252523;
        --bg3: #2e2e2b;
        --text: #f0efe8;
        --text2: #a0a09a;
        --text3: #666662;
        --border: rgba(255,255,255,0.1);
        --border2: rgba(255,255,255,0.2);
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; }
    header { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 16px; height: 56px; }
    header h1 { font-size: 15px; font-weight: 500; }
    header span { font-size: 13px; color: var(--text2); }
    .tabs { display: flex; gap: 0; border-bottom: 0.5px solid var(--border); background: var(--bg); padding: 0 24px; }
    .tab { padding: 12px 18px; font-size: 14px; cursor: pointer; border: none; background: none; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -0.5px; }
    .tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
    .container { max-width: 1200px; margin: 0 auto; padding: 28px 20px; }
    .section { display: none; }
    .section.active { display: block; }
    .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 20px 24px; margin-bottom: 16px; }
    label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; font-weight: 500; }
    select, input[type="text"], input[type="number"], input[type="date"], input[type="password"], textarea {
      width: 100%; padding: 9px 11px; font-size: 14px;
      border: 0.5px solid var(--border2); border-radius: var(--radius);
      background: var(--bg); color: var(--text); font-family: inherit;
    }
    select:focus, input:focus, textarea:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: transparent; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .form-row { margin-bottom: 14px; }
    .btn { display: inline-block; padding: 10px 20px; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); font-family: inherit; }
    .btn-primary { background: var(--text); color: var(--bg); border-color: transparent; width: 100%; margin-top: 4px; }
    .btn-primary:hover { opacity: 0.85; }
    .btn:hover { background: var(--bg2); }
    .metric-card { background: var(--bg2); border-radius: var(--radius); padding: 14px 16px; }
    .metric-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
    .metric-value { font-size: 26px; font-weight: 500; }
    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .bar-label { font-size: 13px; min-width: 140px; max-width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { flex: 1; height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    .bar-hrs { font-size: 12px; color: var(--text2); min-width: 40px; text-align: right; }
    .section-title { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin: 20px 0 10px; }
    .entry-row { display: grid; grid-template-columns: 130px 1fr 1fr 1fr 1fr 48px 70px 28px; gap: 8px; align-items: center; padding: 10px 14px; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; font-size: 13px; }
    .entry-header { display: grid; grid-template-columns: 130px 1fr 1fr 1fr 1fr 48px 70px 28px; gap: 8px; align-items: center; padding: 6px 14px; font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .entry-row:hover { border-color: var(--border2); }
    .avatar { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; flex-shrink: 0; }
    .person-cell { display: flex; align-items: center; gap: 7px; }
    .muted { color: var(--text2); }
    .small { font-size: 11px; color: var(--text3); }
    .del-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 17px; line-height: 1; padding: 0; }
    .del-btn:hover { color: #E24B4A; }
    .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-bar select { font-size: 13px; padding: 6px 10px; width: auto; flex: 1; min-width: 140px; }
    .empty { text-align: center; color: var(--text3); padding: 2.5rem; font-size: 14px; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 10px 20px; border-radius: var(--radius); font-size: 13px; opacity: 0; transition: opacity 0.25s; pointer-events: none; z-index: 999; white-space: nowrap; }
    .toast.show { opacity: 1; }
    .lock-screen { text-align: center; padding: 3rem 1rem; }
    .lock-screen h2 { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
    .lock-screen p { font-size: 14px; color: var(--text2); margin-bottom: 20px; }
    .lock-screen input { max-width: 280px; margin-bottom: 10px; }
    .lock-screen .btn { max-width: 280px; width: 100%; }
    .status-badge { display: inline-block; padding: 2px 7px; border-radius: 20px; font-size: 11px; font-weight: 500; }
    .status-ok { background: #EAF3DE; color: #3B6D11; }
    .status-err { background: #FCEBEB; color: #A32D2D; }
    @media (prefers-color-scheme: dark) {
      .status-ok { background: #27500A; color: #C0DD97; }
      .status-err { background: #501313; color: #F7C1C1; }
    }
    @media (max-width: 600px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .entry-row { grid-template-columns: 1fr 1fr 40px; }
      .entry-row .muted, .entry-row .small { display: none; }
    }
  </style>
</head>

  function buildUrl(params) {
    const url = new URL(APPS_SCRIPT_URL);
    Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
    return url.toString();
  }

  async function postEntry(entry) {
    if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
      entries.unshift(entry);
      return true;
    }
    const url = buildUrl({
      action: 'add',
      id: entry.id,
      person: entry.person,
      date: entry.date,
      project: entry.project,
      event: entry.event,
      hours: entry.hours,
      notes: entry.notes || ''
    });
    const res = await fetch(url);
    const data = await res.json();
    return data.status === 'ok';
  }

  async function loadEntries() {
    if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
      return;
    }
    try {
      const res = await fetch(buildUrl({ action: 'get' }));
      const data = await res.json();
      entries = data.entries || [];
      setSyncStatus('Synced', true);
    } catch(e) {

    const hours   = parseFloat(document.getElementById('hours').value);
    const notes   = document.getElementById('notes').value.trim();
    if (!person || !date || !project || !event || !hours || hours <= 0) {
      toast('Please fill in all required fields.'); return;
    }
    const btn = document.querySelector('#tab-log .btn-primary');
    btn.textContent = 'Saving...'; btn.disabled = true;
    try {
      const ok = await postEntry({ id: Date.now(), person, date, project, event, hours, notes });

  function renderDash() {
    const data = filteredDash();
    const totalHrs  = data.reduce((s,e)=>s+(+e.hours),0);
    const projects  = [...new Set(data.map(e=>e.project))];
    const people    = [...new Set(data.map(e=>e.person))];

    document.getElementById('dash-metrics').innerHTML = `

      <div class="metric-card"><div class="metric-label">Projects tracked</div><div class="metric-value">${projects.length}</div></div>
    `;

    if (!data.length) {
      document.getElementById('dash-charts').innerHTML = '<div class="empty">No entries yet.</div>';
      return;
    }

    const byProject = {}, byEvent = {}, byPerson = {};
    data.forEach(e => {
      byProject[e.project] = (byProject[e.project]||0) + (+e.hours);
      const ek = e.project+': '+e.event;
      byEvent[ek] = (byEvent[ek]||0) + (+e.hours);
      byPerson[e.person] = (byPerson[e.person]||0) + (+e.hours);
    });

    const sortedProj   = Object.entries(byProject).sort((a,b)=>b[1]-a[1]);
    const sortedEvents = Object.entries(byEvent).sort((a,b)=>b[1]-a[1]).slice(0,8);
    const sortedPeople = Object.entries(byPerson).sort((a,b)=>b[1]-a[1]);
    const maxProj   = sortedProj[0]?.[1]   || 1;
    const maxEvent  = sortedEvents[0]?.[1] || 1;
    const maxPerson = sortedPeople[0]?.[1] || 1;

    const bars = (arr, max, colorOffset=0) => arr.map(([label, hrs], i) => `
      <div class="bar-row">
        <div class="bar-label" title="${label}">${label}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(hrs/max*100)}%;background:${COLORS[(i+colorOffset)%COLORS.length]};"></div></div>
        <div class="bar-hrs">${(+hrs).toFixed(1)}h</div>
      </div>`).join('');

    const personRows = sortedPeople.map(([name, hrs]) => {
      const idx = personIdx(name);
      return `<div class="bar-row">
        <div class="person-cell bar-label" style="min-width:140px;max-width:140px;">
          <div class="avatar" style="background:${AVATAR_BG[idx]||'#D3D1C7'};color:${AVATAR_FG[idx]||'#444441'};">${initials(name)}</div>

        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round((+hrs)/maxPerson*100)}%;background:${COLORS[idx%COLORS.length]};"></div></div>
        <div class="bar-hrs">${(+hrs).toFixed(1)}h</div>
      </div>`;
    }).join('');

    document.getElementById('dash-charts').innerHTML = `
      <div class="section-title">Hours by project</div>${bars(sortedProj, maxProj)}
      <div class="section-title">Top events / tasks</div>${bars(sortedEvents, maxEvent, 3)}
      <div class="section-title">Hours by person</div>${personRows}
    `;
  }

    const dateTo     = document.getElementById('entries-filter-date-to').value;
    const data = entries.filter(e =>
      (!proj       || e.project === proj) &&
      (!person     || e.person === person) &&
      (!subproject || e.subproject === subproject) &&
      (!dateFrom   || e.date >= dateFrom) &&
      (!dateTo     || e.date <= dateTo)
    );
    const list   = document.getElementById('entries-list');
    if (!data.length) { list.innerHTML = '<div class="empty">No entries found.</div>'; return; }
    const header = `<div class="entry-header">
      <div>Person</div>
      <div>Project</div>
      <div>Event</div>
      <div>Subproject</div>
      <div>Notes</div>
      <div>Hours</div>
      <div>Date</div>
      <div></div>
    </div>`;
    list.innerHTML = header + data.map(e => {
      const idx = personIdx(e.person);
      return `<div class="entry-row">
        <div class="person-cell">
          <div class="avatar" style="background:${AVATAR_BG[idx]||'#D3D1C7'};color:${AVATAR_FG[idx]||'#444441'};">${initials(e.person)}</div>
          ${e.person}
        </div>
        <div class="muted">${e.project}</div>
        <div class="muted">${e.event}</div>
        <div class="muted">${e.subproject || ''}</div>
        <div class="muted">${e.notes || ''}</div>
        <div style="font-weight:500;">${(+e.hours).toFixed(1)}h</div>
        <div class="muted">${e.date}</div>
        <button class="del-btn" onclick="deleteEntry(${e.id})">×</button>
      </div>`;
    }).join('');
  }

  async function deleteEntry(id) {
    if (!confirm('Delete this entry?')) return;
    if (APPS_SCRIPT_URL && APPS_SCRIPT_URL !== 'YOUR_APPS_SCRIPT_URL_HERE') {
      await fetch(buildUrl({ action: 'delete', id }));
      await loadEntries();
    } else {
      entries = entries.filter(e => e.id != id);
    }
    renderEntries();
  }

  function renderPersonEntries() {
    const person = document.getElementById('person').value;
    const panel = document.getElementById('person-entries-panel');
    const list = document.getElementById('person-entries-list');
    const title = document.getElementById('person-entries-title');
    if (!person) { panel.style.display = 'none'; return; }
    const data = entries.filter(e => e.person === person).slice().sort((a,b) => b.date.localeCompare(a.date));
    panel.style.display = 'block';
    title.textContent = `Recent entries for ${person} (${data.length} total)`;
    if (!data.length) { list.innerHTML = '<div class="empty">No entries yet.</div>'; return; }
    list.innerHTML = data.map(e => `
      <div class="entry-row" style="grid-template-columns: 1fr 1fr 1fr 48px 80px;">
        <div class="muted">${e.event}</div>
        <div class="muted">${e.subproject || ''}</div>
        <div class="muted">${e.notes || ''}</div>
        <div style="font-weight:500;">${(+e.hours).toFixed(1)}h</div>
        <div class="muted">${e.date}</div>
      </div>`).join('');
  }

  function updateSubprojects() {
    const proj = document.getElementById('project').value;
    const sel = document.getElementById('event');
    const subs = PROJECT_SUBPROJECTS[proj] || Object.values(PROJECT_SUBPROJECTS).flat().filter((v,i,a)=>a.indexOf(v)===i).sort();
    sel.innerHTML = '<option value="">Select subproject...</option>' + subs.map(s=>`<option>${s}</option>`).join('');
  }

  // Init
  loadEntries();
</script>
</body>
</html>
